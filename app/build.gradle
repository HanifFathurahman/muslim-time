plugins {
    id "com.android.application"
}

android {
    namespace "com.muslimtime.app"
    compileSdk 36

    defaultConfig {
        applicationId "com.muslimtime.app"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}
